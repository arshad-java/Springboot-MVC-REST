# Application
spring.application.name=SBMVC-LibraryBookManagementSystem

# DataSource

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521:orcl}
spring.datasource.username=${DB_USERNAME:MYDB}
spring.datasource.password=${DB_PASSWORD:MYDB}

# ============================================================
# HikariCP Connection Pool
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false

# Encoding
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.enabled=true